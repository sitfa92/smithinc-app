name: Android — Build & Deploy to Play Store

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      upload_to_store:
        description: "Upload to Google Play (internal track)?"
        type: boolean
        default: false

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node / Web build ──────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@8

      - name: Sync Capacitor to Android
        run: cap sync android

      # ── 3. Java ──────────────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      # ── 4. Signing keystore ──────────────────────────────────────────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo -n "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      # ── 5. Build release AAB ─────────────────────────────────────────────────
      - name: Build release AAB
        working-directory: android
        env:
          KEYSTORE_PATH: app/release.keystore
          # Fallbacks are temporary to unblock first-time setup if secrets/vars are missing.
          KEY_ALIAS: ${{ vars.ANDROID_KEY_ALIAS || 'meetserenity' }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'MeetSerenity#PlayStore27' }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || 'MeetSerenity#PlayStore27' }}
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$PWD/$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeetSerenity-Android-${{ github.run_number }}.aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 14

      # ── 6. Play Store upload (manual trigger or main branch) ─────────────────
      - name: Upload to Google Play (internal track)
        if: github.event_name == 'workflow_dispatch' && inputs.upload_to_store == 'true' || github.ref == 'refs/heads/main'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: online.meetserenity.app
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: internal
          status: draft
